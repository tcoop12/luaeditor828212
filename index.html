<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #1e1e1e;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* Custom scrollbar for tab bar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="flex flex-col h-screen select-none">

    <div class="flex items-center bg-[#181818] border-b border-[#2d2d2d] px-1 h-8 shrink-0">
        <div id="tab-container" class="flex gap-0.5 overflow-x-auto no-scrollbar h-full items-end">
            </div>
        
        <button id="add-tab-btn" class="ml-1 mb-0.5 p-1 rounded text-gray-400 hover:text-white hover:bg-[#2d2d2d] transition-all" title="New Script">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
        </button>
    </div>

    <div id="editor" class="flex-grow w-full h-full"></div>

    <script>
        // Load Monaco Editor
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});

        let editorInstance;
        let tabs = [];
        let activeTabId = null;
        let tabIdCounter = 1;
        const MAX_TABS = 6; // Script cap limit

        require(['vs/editor/editor.main'], function() {
            
            // 1. REGISTER LUA AUTOCOMPLETE PROVIDER WITH ROBLOX & LOADSTRING EXTENSIONS
            monaco.languages.registerCompletionItemProvider('lua', {
                provideCompletionItems: function(model, position) {
                    const suggestions = [
                        // Core Keywords
                        { label: 'local', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'local ' },
                        { label: 'function', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'function ' },
                        { label: 'if', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'if ${1:condition} then\n\t$0\nend', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'then', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'then' },
                        { label: 'else', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'else' },
                        { label: 'elseif', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'elseif ' },
                        { label: 'end', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'end' },
                        { label: 'true', kind: monaco.languages.CompletionItemKind.Value, insertText: 'true' },
                        { label: 'false', kind: monaco.languages.CompletionItemKind.Value, insertText: 'false' },
                        { label: 'nil', kind: monaco.languages.CompletionItemKind.Value, insertText: 'nil' },
                        { label: 'return', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'return ' },
                        { label: 'while', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'while ${1:condition} do\n\t$0\nend', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'for', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'for ${1:i} = ${2:1}, ${3:10} do\n\t$0\nend', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        
                        // Standard Functions (Including loadstring)
                        { label: 'print', kind: monaco.languages.CompletionItemKind.Function, insertText: 'print($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'warn', kind: monaco.languages.CompletionItemKind.Function, insertText: 'warn($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'loadstring', kind: monaco.languages.CompletionItemKind.Function, insertText: 'loadstring(${1:code})()', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Compiles and runs a string as Lua code code.' },
                        { label: 'pairs', kind: monaco.languages.CompletionItemKind.Function, insertText: 'pairs($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'ipairs', kind: monaco.languages.CompletionItemKind.Function, insertText: 'ipairs($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'type', kind: monaco.languages.CompletionItemKind.Function, insertText: 'type($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'tostring', kind: monaco.languages.CompletionItemKind.Function, insertText: 'tostring($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'tonumber', kind: monaco.languages.CompletionItemKind.Function, insertText: 'tonumber($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },

                        // Roblox Globals & Environment
                        { label: 'game', kind: monaco.languages.CompletionItemKind.Class, insertText: 'game' },
                        { label: 'workspace', kind: monaco.languages.CompletionItemKind.Class, insertText: 'workspace' },
                        { label: 'script', kind: monaco.languages.CompletionItemKind.Variable, insertText: 'script' },
                        { label: 'Instance.new', kind: monaco.languages.CompletionItemKind.Method, insertText: 'Instance.new("${1:ClassName}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'Vector3.new', kind: monaco.languages.CompletionItemKind.Method, insertText: 'Vector3.new(${1:x}, ${2:y}, ${3:z})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'CFrame.new', kind: monaco.languages.CompletionItemKind.Method, insertText: 'CFrame.new($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'Color3.fromRGB', kind: monaco.languages.CompletionItemKind.Method, insertText: 'Color3.fromRGB(${1:r}, ${2:g}, ${3:b})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        
                        // Roblox Common Methods
                        { label: 'GetService', kind: monaco.languages.CompletionItemKind.Method, insertText: 'GetService("${1:ServiceName}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'WaitForChild', kind: monaco.languages.CompletionItemKind.Method, insertText: 'WaitForChild("${1:ChildName}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'FindFirstChild', kind: monaco.languages.CompletionItemKind.Method, insertText: 'FindFirstChild("${1:ChildName}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'Destroy', kind: monaco.languages.CompletionItemKind.Method, insertText: 'Destroy()' },
                        { label: 'Clone', kind: monaco.languages.CompletionItemKind.Method, insertText: 'Clone()' },
                        
                        // Roblox task Scheduler Library
                        { label: 'task.wait', kind: monaco.languages.CompletionItemKind.Method, insertText: 'task.wait(${1:seconds})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'task.spawn', kind: monaco.languages.CompletionItemKind.Method, insertText: 'task.spawn(${1:function})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'task.defer', kind: monaco.languages.CompletionItemKind.Method, insertText: 'task.defer(${1:function})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet }
                    ];

                    // Read local variables dynamically
                    const wordRegex = /\blocal\s+([a-zA-Z_]\w*)/g;
                    const codeText = model.getValue();
                    let match;
                    const foundVariables = new Set();
                    
                    while ((match = wordRegex.exec(codeText)) !== null) {
                        foundVariables.add(match[1]);
                    }

                    foundVariables.forEach(varName => {
                        suggestions.push({
                            label: varName,
                            kind: monaco.languages.CompletionItemKind.Variable,
                            insertText: varName
                        });
                    });

                    return { suggestions: suggestions };
                }
            });

            // 2. INITIALIZE MONACO WITH COMPACT STYLING
            editorInstance = monaco.editor.create(document.getElementById('editor'), {
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 12,
                fontFamily: "Consolas, 'Courier New', monospace",
                minimap: { enabled: true },
                lineNumbers: "on",
                lineHeight: 18,
                cursorBlinking: "smooth",
                cursorSmoothCaretAnimation: "on",
                suggestOnTriggerCharacters: true,
                wordBasedSuggestions: "allDocuments"
            });

            // Create initial default tab
            createNewTab();

            // Event listener for adding new tabs
            document.getElementById('add-tab-btn').addEventListener('click', () => {
                createNewTab();
            });
        });

        // Function to create a new tab sequentially
        function createNewTab() {
            if (tabs.length >= MAX_TABS) return;

            const id = tabIdCounter;
            const tabName = `script${id}.lua`;
            tabIdCounter++;

            const model = monaco.editor.createModel(`-- Welcome to Quantum-Script --\n\n`, 'lua');

            const tab = {
                id: id,
                name: tabName,
                model: model
            };

            tabs.push(tab);
            renderTabs();
            switchTab(id);
        }

        // Render compact tab list UI
        function renderTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';

            tabs.forEach(tab => {
                const isActive = tab.id === activeTabId;
                const tabEl = document.createElement('div');
                tabEl.className = `flex items-center gap-1.5 px-2.5 py-1 text-[10px] font-medium cursor-pointer transition-all rounded-t border-t-2 ${
                    isActive 
                        ? 'bg-[#1e1e1e] text-white border-blue-500' 
                        : 'text-gray-400 hover:text-gray-200 bg-[#141414] border-transparent hover:bg-[#1a1a1a]'
                }`;
                
                tabEl.addEventListener('click', () => switchTab(tab.id));
                tabEl.addEventListener('dblclick', () => renameTab(tab.id));

                const titleSpan = document.createElement('span');
                titleSpan.textContent = tab.name;
                tabEl.appendChild(titleSpan);

                // Close Button
                if (tabs.length > 1) {
                    const closeBtn = document.createElement('button');
                    closeBtn.className = "hover:bg-[#2d2d2d] rounded-full p-0.5 ml-0.5 transition-all";
                    closeBtn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-2.5 h-2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    `;
                    closeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        closeTab(tab.id);
                    });
                    tabEl.appendChild(closeBtn);
                }

                container.appendChild(tabEl);
            });

            const addBtn = document.getElementById('add-tab-btn');
            if (tabs.length >= MAX_TABS) {
                addBtn.style.display = 'none';
            } else {
                addBtn.style.display = 'block';
            }
        }

        // Switch active tab
        function switchTab(id) {
            activeTabId = id;
            const targetTab = tabs.find(t => t.id === id);
            if (targetTab && editorInstance) {
                editorInstance.setModel(targetTab.model);
            }
            renderTabs();
        }

        // Close selected tab
        function closeTab(id) {
            const index = tabs.findIndex(t => t.id === id);
            if (index !== -1) {
                tabs[index].model.dispose();
                tabs.splice(index, 1);

                if (activeTabId === id) {
                    const nextActiveTab = tabs[index] || tabs[index - 1];
                    activeTabId = nextActiveTab ? nextActiveTab.id : null;
                }
                
                renderTabs();
                if (activeTabId) {
                    switchTab(activeTabId);
                }
            }
        }

        // Rename script manually
        function renameTab(id) {
            const tab = tabs.find(t => t.id === id);
            if (tab) {
                const newName = prompt("Rename script:", tab.name);
                if (newName && newName.trim() !== "") {
                    tab.name = newName.trim();
                    renderTabs();
                }
            }
        }
    </script>
</body>
</html>
